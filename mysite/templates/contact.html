{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact — Ronard Tech</title>
  <link rel="stylesheet" href="{% static 'styles.css' %}">
  <meta name="description" content="Contact Ronard Tech Computer Solutions">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="brand"><a href="/">Ronard Tech</a></h1>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="/projects/">Projects</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="contact-page">
      <h2>Contact Us</h2>
      <p>You can email us directly at <a href="mailto:info@ronardtech.example">info@ronardtech.example</a>, or use the form below — it opens your mail client.</p>

      <form action="mailto:info@ronardtech.example" method="post" enctype="text/plain" class="contact-form">
        <label>
          Name
          <input name="Name" required>
        </label>
        <label>
          Email
          <input name="Email" type="email" required>
        </label>
        <label>
          Message
          <textarea name="Message" rows="6" required></textarea>
        </label>
        <button class="btn" type="submit">Send</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© {% now "Y" %} Ronard Tech Computer Solutions</p>
    </div>
  </footer>
</body>
</html>
